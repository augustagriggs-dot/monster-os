<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MONSTER OS // RETAIL ELITE</title>
    <style>
        :root { --accent: #00d2ff; --bg: #050505; --card: #111; }
        body { 
            background: var(--bg); color: white; font-family: 'Inter', sans-serif; 
            margin: 0; padding: 40px; overflow-y: auto; scroll-behavior: smooth;
        }
        h2 { 
            font-size: 1.1rem; letter-spacing: 5px; color: rgba(255,255,255,0.4); 
            margin: 50px 0 25px 0; text-transform: uppercase; 
            border-left: 3px solid var(--accent); padding-left: 20px; 
        }
        .row { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 20px; }
        
        .box { 
            width: 220px; height: 320px; background: var(--card); border-radius: 12px;
            text-decoration: none; overflow: hidden; position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            border: 1px solid #1f1f1f; display: flex; flex-direction: column;
        }
        .box:hover { 
            transform: scale(1.06) translateY(-10px); 
            border-color: var(--accent);
            box-shadow: 0 20px 40px rgba(0,210,255,0.3);
            z-index: 10;
        }
        .box img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; transition: 0.5s; }
        .box:hover img { opacity: 1; filter: brightness(1.2); }
        
        .box .label { 
            position: absolute; bottom: 0; width: 100%; height: 25%;
            background: linear-gradient(to top, rgba(0,0,0,1), transparent);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.85rem; font-weight: 900; letter-spacing: 1px;
            color: #fff; text-align: center; padding: 0 10px; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <h2>// LEGAL INTEL COMMAND</h2>
    <div class="row" id="law-row"></div>

    <h2>// PRODUCTION & FACTORY</h2>
    <div class="row" id="tool-row"></div>

    <h2>// CINEMATIC LOUNGE</h2>
    <div class="row" id="movie-row"></div>

    <script>
        const law = [

            {n:"JUSTIA", u:"https://law.justia.com", img:"https://images.unsplash.com/photo-1505664194779-8beaceb93744?w=400&q=80"},
            {n:"CASELAW", u:"https://www.courtlistener.com", img:"https://images.unsplash.com/photo-1453948574235-5f333939317b?w=400&q=80"},

            {n:"AI LAWYER", u:"https://ailawyer.pro", img:"https://images.unsplash.com/photo-1677442136019-21780ecad995?w=400&q=80"},
            {n:"ROBART", u:"https://chatgpt.com", img:"https://images.unsplash.com/photo-1676277791608-ac54525aa94d?w=400&q=80"},
            {n:"GEMINI", u:"https://gemini.google.com", img:"https://images.unsplash.com/photo-1620712943543-bcc4628c9757?w=400&q=80"},

            {n:"COMPLAINTS", u:"https://www.e-forms.us", img:"https://images.unsplash.com/photo-1554224155-8d04cb21cd6c?w=400&q=80"},
            {n:"E-FORMS", u:"https://eforms.com", img:"https://images.unsplash.com/photo-1450101499163-c8848c66ca85?w=400&q=80"}
        ];

        const tools = [

            {n:"GITHUB", u:"https://github.com", img:"https://images.unsplash.com/photo-1618401471353-b98afee0b2eb?w=400&q=80"},

            {n:"DRIVE", u:"https://drive.google.com", img:"https://images.unsplash.com/photo-1614332287897-cdc485fa562d?w=400&q=80"},
            {n:"DROPBOX", u:"https://www.dropbox.com", img:"https://images.unsplash.com/photo-1627933606244-96a2c3d33427?w=400&q=80"},
            {n:"GMAIL", u:"https://mail.google.com", img:"https://images.unsplash.com/photo-1596526131083-e8c633c948d2?w=400&q=80"},
            {n:"YAHOO", u:"https://yahoo.com", img:"https://images.unsplash.com/photo-1603302576837-37561b2e2302?w=400&q=80"},
            {n:"CASEFOX", u:"https://www.casefox.com", img:"https://images.unsplash.com/photo-1553484771-047a44eee27b?w=400&q=80"},

        ];

        const movies = [
            {n:"CINEBY", u:"https://cineby.app", img:"https://image.tmdb.org/t/p/w500/r2J0VvYmRbu6SpiuSgnv3qOEB49.jpg"},
            {n:"BITCINE", u:"https://bitcine.app", img:"https://image.tmdb.org/t/p/w500/8Gxv8UbgkDP4Xn7QSYzbfsSBLm9.jpg"},
            {n:"FLIX HQ", u:"https://flixhq.to", img:"https://image.tmdb.org/t/p/w500/jRXYj93bnvD72o2Dq9UreS0Ah7n.jpg"},
            {n:"PLUTO TV", u:"https://pluto.tv", img:"https://image.tmdb.org/t/p/w500/8Y0vE5x7C45m5Y1vO3D2j9Y0vE5.jpg"},
            {n:"TUBI TV", u:"https://tubitv.com", img:"https://image.tmdb.org/t/p/w500/uS9mYqbOW9PXmOW47oYp9p9oYm.jpg"},
            {n:"YOUTUBE", u:"https://youtube.com", img:"https://image.tmdb.org/t/p/w500/v9STvPpg2v5Yp9pY9oYm.jpg"}
        ];

        const fill = (data, id) => {
            const el = document.getElementById(id);
            data.forEach(item => {
                el.innerHTML += `<a href="${item.u}" class="box"><img src="${item.img}"><div class="label">${item.n}</div></a>`;
            });
        }
        fill(law, 'law-row'); fill(tools, 'tool-row'); fill(movies, 'movie-row');
    </script>
</body>
</html>
