<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GOSTREAMER Monster OS</title>
    <style>
        :root { --n: #39FF14; --bg: #000; --card: #111; }
        body { 
            background: radial-gradient(circle at top, #0a250a 0%, #000 85%) !important; 
            background-color: #000 !important; color: #fff; font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 20px 40px; overflow-x: hidden;
        }
        .hdr { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 0; border-bottom: 2px solid var(--n); 
            margin-bottom: 30px; position: sticky; top: 0; background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px); z-index: 1000;
        }
        .hdr h1 { color: var(--n); text-shadow: 0 0 15px var(--n); margin: 0; font-size: 2.2rem; }
        #clk { font-size: 1.6rem; color: var(--n); font-weight: bold; }
        .rw { margin-bottom: 50px; }
        .rt { font-size: 1.3rem; color: #fff; margin-bottom: 15px; border-left: 5px solid var(--n); padding-left: 15px; font-weight: 800; text-transform: uppercase; }
        .tc { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .t { 
            background: var(--card); border: 1px solid #222; border-radius: 12px; text-decoration: none; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            padding: 10px; transition: 0.4s; aspect-ratio: 16 / 9; overflow: hidden; position: relative;
        }
        .t:hover { transform: scale(1.05); border-color: var(--n); box-shadow: 0 0 25px rgba(57, 255, 20, 0.4); z-index: 10; background: #000; }
        .t img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }
        .t span { 
            position: absolute; bottom: 8px; left: 8px; font-weight: bold; font-size: 0.7rem; 
            text-transform: uppercase; color: #fff; background: rgba(0,0,0,0.8); 
            padding: 2px 6px; border-radius: 4px; border-left: 3px solid var(--n);
        }
    </style>
</head>
<body>
    <div class="hdr"><h1>GOSTREAMER <span style="font-size:0.8rem; color:#fff;">MONSTER OS</span></h1><div id="clk">00:00:00</div></div>

    <div class="rw">
        <div class="rt">🎬 Premium Cinema</div>
        <div class="tc">
            <a href="https://cineby.gd" class="t"><img src="img/poster1.jpg"><span>Cineby</span></a>
            <a href="https://hdtoday.tv" class="t"><img src="img/poster2.jpg"><span>HD Today</span></a>
            <a href="https://bflix.to" class="t"><img src="img/poster4.jpg"><span>BFlix</span></a>
            <a href="https://vumoo.to" class="t"><img src="img/poster3.jpg"><span>Vumoo</span></a>
        </div>
    </div>

    <div class="rw">
        <div class="rt">🏆 Live Sports</div>
        <div class="tc">
            <a href="https://thestreameast.to" class="t"><img src="img/espn.png" style="object-fit:contain;"><span>StreamEast</span></a>
            <a href="https://nflbite.to" class="t"><img src="img/nfl.png" style="object-fit:contain;"><span>NFL Bite</span></a>
            <a href="https://nbabite.to" class="t"><img src="img/nba.png" style="object-fit:contain;"><span>NBA Bite</span></a>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('clk').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
