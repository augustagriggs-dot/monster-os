<!DOCTYPE html>
<html>
<head>
<title>GOSTREAMER</title>
<style>
 :root { --n: #39FF14; }
 body { 
  background: #000; 
  color: #fff; 
  font-family: sans-serif; 
  padding: 20px; 
 }
 .hdr { 
  border-bottom: 2px solid var(--n); 
  margin-bottom: 30px; 
  display: flex; 
  justify-content: space-between; 
 }
 .hdr h1 { color: var(--n); }
 .rw { margin-bottom: 40px; }
 .rt { 
  border-left: 5px solid var(--n); 
  padding-left: 10px; 
  margin-bottom: 15px; 
  font-weight: bold; 
 }
 .tc { 
  display: grid; 
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
  gap: 20px; 
 }
 .t { 
  background: #111; 
  border: 1px solid #222; 
  border-radius: 10px; 
  text-decoration: none; 
  aspect-ratio: 16/9; 
  display: flex; 
  flex-direction: column; 
  align-items: center; 
  justify-content: center; 
  overflow: hidden; 
  position: relative; 
 }
 .t:hover { 
  border-color: var(--n); 
  transform: scale(1.05); 
 }
 .t img { 
  width: 100%; 
  height: 100%; 
  object-fit: cover; 
 }
 .t span { 
  position: absolute; 
  bottom: 5px; 
  background: rgba(0,0,0,0.8); 
  color: #fff; 
  font-size: 10px; 
  padding: 2px 5px; 
 }
</style>
</head>
<body>
<div class="hdr">
 <h1>GOSTREAMER</h1>
 <div id="clk"></div>
</div>

<div class="rw">
 <div class="rt">🎬 PREMIUM CINEMA</div>
 <div class="tc">
  <a href="https://cineby.gd" class="t">
   <img src="img/poster1.jpg">
   <span>CINEBY</span>
  </a>
  <a href="https://hdtoday.tv" class="t">
   <img src="img/poster2.jpg">
   <span>HD TODAY</span>
  </a>
  <a href="https://bflix.to" class="t">
   <img src="img/poster4.jpg">
   <span>BFLIX</span>
  </a>
  <a href="https://vumoo.to" class="t">
   <img src="img/poster3.jpg">
   <span>VUMOO</span>
  </a>
 </div>
</div>

<div class="rw">
 <div class="rt">🏆 LIVE SPORTS</div>
 <div class="tc">
  <a href="https://thestreameast.to" class="t">
   <img src="img/espn.png" style="object-fit:contain">
   <span>ESPN</span>
  </a>
  <a href="https://nflbite.to" class="t">
   <img src="img/nfl.png" style="object-fit:contain">
   <span>NFL BITE</span>
  </a>
  <a href="https://nbabite.to" class="t">
   <img src="img/nba.png" style="object-fit:contain">
   <span>NBA BITE</span>
  </a>
 </div>
</div>

<script>
 setInterval(() => { 
  document.getElementById('clk').innerText = new Date().toLocaleTimeString(); 
 }, 1000);
</script>
</body>
</html>
