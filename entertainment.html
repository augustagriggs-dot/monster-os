<!DOCTYPE html><html><head><style>
:root{--n:#39FF14;--bg:#0a0a0a;--p:#151515;}
body{background:var(--bg);color:#fff;margin:0;zoom:80%;font-family:sans-serif;overflow-x:hidden;}
.hdr{display:flex;justify-content:space-between;padding:10px 40px;border-bottom:2px solid var(--n);position:sticky;top:0;background:#000;z-index:10;}
.rw{padding:15px 0 0 30px;}.rt{font-size:1rem;color:#666;text-transform:uppercase;font-weight:800;}
.tc{display:flex;overflow-x:auto;gap:10px;padding:10px 0;scrollbar-width:none;}
.t{background:var(--p);border-radius:6px;text-decoration:none;color:#fff;border:1px solid #222;display:flex;align-items:flex-end;min-width:145px;height:210px;transition:0.2s;}
.w{min-width:210px!important;height:110px!important;}.t:hover{border-color:var(--n);transform:scale(1.05);}
.t span{background:rgba(0,0,0,0.8);width:100%;padding:8px;font-size:0.8rem;font-weight:bold;border-top:1px solid #333;}
</style></head><body><div class="hdr"><h1>GOSTREAMER</h1><h1 id="clk">00:00</h1></div>
